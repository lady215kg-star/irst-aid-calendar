<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FirstAid Calendar</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="app-header">
        <button class="hamburger" id="menuBtn">
            <span></span><span></span><span></span>
        </button>
        <div class="header-logo">
            <div class="logo-cross">✚</div>
            <span class="logo-text">FirstAid</span>
        </div>
        <div class="header-action">🔔</div>
    </header>

    <div class="sidebar-overlay" id="overlay"></div>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">Меню</div>
            <button class="sidebar-close" id="closeSidebar">✕</button>
        </div>
        <nav class="sidebar-nav">
            <div class="sidebar-section-label">Обучение</div>
            <a href="#" class="sidebar-item">📚 База знаний</a>
            <a href="#" class="sidebar-item">🚑 Алгоритмы ПМП</a>
        </nav>
    </aside>

    <main class="app-main">
        <section class="calendar-card">
    <div class="calendar-nav">
        <button class="nav-btn" onclick="changeMonth(-1)">❮</button>
        <div class="calendar-title-wrap">
            <span class="calendar-month" id="monthDisplay"></span>
            <span class="calendar-year" id="yearDisplay"></span>
        </div>
        <button class="nav-btn" onclick="changeMonth(1)">❯</button>
    </div>

    <div id="iconLibrary" style="display: none;">
        <span class="ico-time">⏰</span>
        <span class="ico-location">📍</span>
    </div>

    <div class="weekdays">
        <span>Пн</span><span>Вт</span><span>Ср</span><span>Чт</span><span>Пт</span><span class="weekend">Сб</span><span class="weekend">Вс</span>
    </div>
    
    <div class="calendar-grid" id="calendarGrid"></div>

    <div class="date-label-wrap">
        <div class="date-label-pill">
            <div class="pulse-dot"></div>
            <span id="selectedDateLabel">Выберите дату</span>
        </div>
    </div>
</section>
            <div class="calendar-nav">
                <button class="nav-btn" id="prevMonth">❮</button>
                <div class="calendar-title-wrap">
                    <span class="calendar-month" id="monthDisplay">Апрель</span>
                    <span class="calendar-year" id="yearDisplay">2026</span>
                </div>
                <button class="nav-btn" id="nextMonth">❯</button>
            </div>

            <div class="weekdays">
                <span>Пн</span><span>Вт</span><span>Ср</span><span>Чт</span><span>Пт</span><span class="weekend">Сб</span><span class="weekend">Вс</span>
            </div>
            
            <div class="calendar-grid" id="calendarGrid">
                </div>

            <div class="date-label-wrap">
                <div class="date-label-pill">
                    <div class="pulse-dot"></div>
                    <span id="selectedDateLabel">Выберите дату</span>
                </div>
            </div>
        </section>
    </main>

    <section class="bottom-sheet" id="bottomSheet">
        <div class="sheet-handle-wrap" id="sheetHandle">
            <div class="sheet-handle"></div>
        </div>
        <div class="sheet-header">
            <div class="sheet-title-wrap">
                <h3 class="sheet-title">События</h3>
                <p class="sheet-subtitle">План на день</p>
            </div>
            <button class="add-event-btn" id="openModal">+ Добавить</button>
        </div>
        <div class="events-list" id="eventsList">
            <div class="empty-state">
                <span class="empty-icon">📅</span>
                <p>На этот день пока нет задач</p>
            </div>
        </div>
    </section>

    <script type="module" src="app.js"></script>
</body>
</html>
